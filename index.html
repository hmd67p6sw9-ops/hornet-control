<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  >

  <title>Hornet Control</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">

  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="Hornet Control"
  >

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    .history-item {
  padding: 14px 0;
  border-bottom: 1px solid #e5e7eb;
}

.history-time {
  color: #6b7280;
  font-size: 13px;
  margin-bottom: 6px;
}

.history-main {
  font-size: 17px;
  font-weight: 700;
}

.history-arrow {
  display: inline-block;
  margin: 0 8px;
  color: #6b7280;
}

.history-comment {
  margin-top: 6px;
  color: #374151;
  font-size: 15px;
}
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      background: #111827;
      color: #111827;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      margin-bottom: 14px;
      padding: 18px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 28px;
    }

    h2 {
      margin: 0;
      text-align: center;
      font-size: 30px;
    }

    #reader {
      width: 100%;
      min-height: 280px;
      overflow: hidden;
      background: #000000;
      border-radius: 14px;
    }

    .scanner-help {
      margin: 12px 0 0;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }

    .field {
      padding: 13px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .field:last-of-type {
      border-bottom: 0;
    }

    .label {
      margin-bottom: 5px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .value {
      min-height: 26px;
      font-size: 21px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .empty-value {
      color: #9ca3af;
      font-weight: 500;
    }

    .starlink-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .starlink-row .value {
      flex: 1;
    }

    .small-button {
      width: auto;
      min-width: 110px;
      margin: 0;
      padding: 10px 12px;
      font-size: 15px;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 700;
    }

    .badge-storage { background: #bfdbfe; }
    .badge-workshop { background: #fde68a; }
    .badge-ready { background: #bbf7d0; }
    .badge-damaged { background: #fed7aa; }
    .badge-written-off { background: #fecaca; }
    .badge-unknown { background: #e5e7eb; }

    .status-section {
      margin-top: 18px;
    }

    .status-section-title {
      margin-bottom: 8px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    button {
      width: 100%;
      margin-top: 9px;
      padding: 15px;
      border: 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.38;
      cursor: default;
    }

    .primary {
      background: #2563eb;
      color: #ffffff;
    }

    .storage { background: #93c5fd; }
    .workshop { background: #fcd34d; }
    .ready { background: #86efac; }
    .damaged { background: #fdba74; }
    .written-off { background: #fca5a5; }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    #message,
    #cardMessage,
    #starlinkMessage {
      margin-top: 12px;
      padding: 12px;
      border-radius: 11px;
      font-size: 16px;
    }

    .info { background: #dbeafe; }
    .success { background: #dcfce7; }
    .error { background: #fee2e2; }

    .hidden {
      display: none !important;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: rgba(0, 0, 0, 0.62);
    }

    .modal-content {
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 18px;
      background: #ffffff;
      border-radius: 20px 20px 14px 14px;
    }

    .modal-title {
      margin: 0 0 14px;
      text-align: center;
      font-size: 24px;
    }

    .starlink-option {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: 9px;
      padding: 14px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      text-align: left;
      font-size: 17px;
    }

    .starlink-option.current {
      border-color: #2563eb;
      background: #dbeafe;
    }

    .starlink-option input {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .starlink-option-text {
      flex: 1;
    }

    .starlink-id {
      display: block;
      font-weight: 700;
    }

    .starlink-meta {
      display: block;
      margin-top: 3px;
      color: #6b7280;
      font-size: 13px;
      font-weight: 500;
    }

    .no-items {
      padding: 18px 4px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="scannerCard" class="card">
      <h1>Hornet Control</h1>

      <div id="reader"></div>

      <p class="scanner-help">
        Наведи камеру на QR-код борта
      </p>

      <button
        id="cameraButton"
        class="primary hidden"
        onclick="startScanner()"
      >
        Запустити камеру
      </button>

      <div id="message" class="info">
        Запуск камери…
      </div>
    </div>

    <div id="aircraftCard" class="card hidden">
      <h2 id="aircraftId"></h2>

      <div class="field">
        <div class="label">Статус</div>
        <div id="currentStatus"></div>
      </div>

      <div class="field">
        <div class="label">STARLINK</div>

        <div class="starlink-row">
          <div id="starlink" class="value"></div>

          <button
            class="primary small-button"
            onclick="openStarlinkModal()"
          >
            Змінити
          </button>
        </div>
      </div>

      <div class="field">
        <div class="label">Серійний номер</div>
        <div id="serialNumber" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Дата отримання</div>
        <div id="receivedDate" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Остання зміна</div>
        <div id="lastChange" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Коментар</div>
        <div id="comment" class="value"></div>
      </div>

      <div class="status-section">
        <div class="status-section-title">
          Змінити статус
        </div>

        <button
          class="status-button storage"
          data-status="На складі"
          onclick="changeStatus('На складі')"
        >
          На складі
        </button>

        <button
          class="status-button workshop"
          data-status="Майстерня"
          onclick="changeStatus('Майстерня')"
        >
          Майстерня
        </button>

        <button
          class="status-button ready"
          data-status="БГ"
          onclick="changeStatus('БГ')"
        >
          БГ
        </button>

        <button
          class="status-button damaged"
          data-status="Пошкоджено"
          onclick="changeStatus('Пошкоджено')"
        >
          Пошкоджено
        </button>

        <button
          class="status-button written-off"
          data-status="Списаний"
          onclick="changeStatus('Списаний')"
        >
          Списаний
        </button>
      </div>

      <button
        class="secondary"
        onclick="scanAnotherAircraft()"
      >
      <button
  class="secondary"
  onclick="openHistoryModal()"
>
  Історія
</button>
        Сканувати інший борт
      </button>
    </div>
  </div>

  <div id="starlinkModal" class="modal hidden">
    <div class="modal-content">
      <h3 class="modal-title">Прив’язка STARLINK</h3>

      <div id="starlinkOptions">
        <div class="no-items">
          Завантаження…
        </div>
      </div>

      <div id="starlinkMessage" class="hidden"></div>

      <button
        id="saveStarlinkButton"
        class="primary"
        onclick="saveStarlinkAssignment()"
      >
        Зберегти
      </button>

      <button
        id="unlinkStarlinkButton"
        class="danger"
        onclick="unlinkStarlink()"
      >
        Відв’язати STARLINK
      </button>

      <button
        class="secondary"
        onclick="closeStarlinkModal()"
      >
        Скасувати
      </button>
    </div>
  </div>

  <script>
    function openHistoryModal() {
  if (!selectedAircraftId) return;

  document
    .getElementById("historyModal")
    .classList.remove("hidden");

  document.getElementById("historyList").innerHTML =
    '<div class="no-items">Завантаження…</div>';

  apiRequest(
    {
      action: "history",
      id: selectedAircraftId
    },
    function (response) {
      if (!response.ok) {
        document.getElementById("historyList").innerHTML = "";

        showHistoryMessage(
          response.error || "Не вдалося завантажити історію",
          "error"
        );

        return;
      }

      renderHistory(response.history || []);
    }
  );
}

function renderHistory(items) {
  const container =
    document.getElementById("historyList");

  container.innerHTML = "";

  if (!items.length) {
    container.innerHTML =
      '<div class="no-items">Історія відсутня</div>';

    return;
  }

  items.forEach(function (item) {
    const block = document.createElement("div");
    block.className = "history-item";

    const time = document.createElement("div");
    time.className = "history-time";
    time.textContent = item.timestamp;

    const main = document.createElement("div");
    main.className = "history-main";

    if (item.type === "starlink") {
      main.textContent = item.comment;
    } else {
      const oldStatus = item.oldStatus || "Не вказано";
      const newStatus = item.newStatus || "Не вказано";

      main.innerHTML =
        escapeHtml(oldStatus) +
        '<span class="history-arrow">→</span>' +
        escapeHtml(newStatus);
    }

    block.appendChild(time);
    block.appendChild(main);

    if (
      item.comment &&
      item.type !== "starlink"
    ) {
      const comment = document.createElement("div");
      comment.className = "history-comment";
      comment.textContent = item.comment;
      block.appendChild(comment);
    }

    container.appendChild(block);
  });
}

function closeHistoryModal() {
  document
    .getElementById("historyModal")
    .classList.add("hidden");

  hideHistoryMessage();
}

function showHistoryMessage(text, type) {
  const element =
    document.getElementById("historyMessage");

  element.textContent = text;
  element.className = type || "info";
  element.classList.remove("hidden");
}

function hideHistoryMessage() {
  const element =
    document.getElementById("historyMessage");

  element.textContent = "";
  element.className = "hidden";
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
    
    const API_URL =
      "https://script.google.com/macros/s/AKfycbwphLvMa8Ufe2HYMFz2Vg9LqJenq3alIktIiGESiYxN6mwtkCarxxoAiETCfPksnvD3/exec";

    const API_KEY =
      "HC_7YkP9vLm42QaX8Nr5DzB1UcEe96MwFs";

    let scanner = null;
    let scannerRunning = false;
    let scanLocked = false;

    let selectedAircraftId = "";
    let currentAircraftStatus = "";
    let currentStarlinkId = "";
    let selectedStarlinkId = "";

    window.addEventListener("load", function () {
      startScanner();
    });

    async function startScanner() {
      scanLocked = false;
      selectedAircraftId = "";
      currentAircraftStatus = "";
      currentStarlinkId = "";
      selectedStarlinkId = "";

      closeStarlinkModal();

      document
        .getElementById("aircraftCard")
        .classList.add("hidden");

      document
        .getElementById("scannerCard")
        .classList.remove("hidden");

      document
        .getElementById("cameraButton")
        .classList.add("hidden");

      showMessage("Запуск камери…", "info");

      if (!scanner) {
        scanner = new Html5Qrcode("reader");
      }

      try {
        await scanner.start(
          {
            facingMode: {
              exact: "environment"
            }
          },
          {
            fps: 12,
            qrbox: function (width, height) {
              const size = Math.floor(
                Math.min(width, height) * 0.75
              );

              return {
                width: size,
                height: size
              };
            }
          },
          onScanSuccess,
          function () {}
        );

        scannerRunning = true;
        hideMessage();

      } catch (firstError) {
        try {
          await scanner.start(
            { facingMode: "environment" },
            {
              fps: 12,
              qrbox: 250
            },
            onScanSuccess,
            function () {}
          );

          scannerRunning = true;
          hideMessage();

        } catch (secondError) {
          scannerRunning = false;

          showMessage(
            "Автоматичний запуск камери заблокований. Натисни кнопку нижче.",
            "error"
          );

          document
            .getElementById("cameraButton")
            .classList.remove("hidden");
        }
      }
    }

    async function stopScanner() {
      if (!scanner || !scannerRunning) return;

      try {
        await scanner.stop();
      } catch (error) {
        console.log(error);
      }

      scannerRunning = false;
    }

    async function onScanSuccess(decodedText) {
      if (scanLocked) return;

      const id = normalizeId(decodedText);

      if (!id) return;

      scanLocked = true;

      await stopScanner();

      loadAircraft(id);
    }

    function normalizeId(value) {
      const text = String(value || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "");

      const match = text.match(/HN-\d{4}/);

      return match ? match[0] : "";
    }

    function loadAircraft(id) {
      showMessage(
        "Завантаження " + id + "…",
        "info"
      );

      apiRequest(
        {
          action: "get",
          id: id
        },
        function (response) {
          if (!response.ok) {
            showMessage(
              response.error || "Помилка завантаження",
              "error"
            );

            scanLocked = false;
            return;
          }

          showAircraft(response.aircraft);
        }
      );
    }

    function showAircraft(aircraft) {
      selectedAircraftId = aircraft.id;
      currentAircraftStatus = aircraft.status;
      currentStarlinkId = aircraft.starlink || "";

      document.getElementById("aircraftId").textContent =
        aircraft.id;

      setStatusBadge(aircraft.status);

      setFieldValue(
        "starlink",
        aircraft.starlink,
        "Не прив’язаний"
      );

      setFieldValue(
        "serialNumber",
        aircraft.serialNumber,
        "Не вказано"
      );

      setFieldValue(
        "receivedDate",
        aircraft.receivedDate,
        "Не вказано"
      );

      setFieldValue(
        "lastChange",
        aircraft.lastChange,
        "Немає даних"
      );

      setFieldValue(
        "comment",
        aircraft.comment,
        "Немає коментаря"
      );

      updateStatusButtons(aircraft.status);

      document
        .getElementById("scannerCard")
        .classList.add("hidden");

      document
        .getElementById("aircraftCard")
        .classList.remove("hidden");

      hideMessage();
    }

    function setFieldValue(elementId, value, emptyText) {
      const element =
        document.getElementById(elementId);

      if (value) {
        element.textContent = value;
        element.classList.remove("empty-value");
      } else {
        element.textContent = emptyText;
        element.classList.add("empty-value");
      }
    }

    function setStatusBadge(status) {
      const element =
        document.getElementById("currentStatus");

      element.textContent = status || "Не вказано";
      element.className = "status-badge";

      const classes = {
        "На складі": "badge-storage",
        "Майстерня": "badge-workshop",
        "БГ": "badge-ready",
        "Пошкоджено": "badge-damaged",
        "Списаний": "badge-written-off"
      };

      element.classList.add(
        classes[status] || "badge-unknown"
      );
    }

    function updateStatusButtons(status) {
      document
        .querySelectorAll(".status-button")
        .forEach(function (button) {
          button.disabled =
            button.dataset.status === status;
        });
    }

    function changeStatus(status) {
      if (!selectedAircraftId) return;

      disableStatusButtons(true);
      showCardMessage("Збереження…", "info");

      apiRequest(
        {
          action: "update",
          id: selectedAircraftId,
          status: status
        },
        function (response) {
          if (!response.ok) {
            disableStatusButtons(false);

            showCardMessage(
              response.error || "Помилка збереження",
              "error"
            );

            return;
          }

          currentAircraftStatus = status;

          setStatusBadge(status);
          updateStatusButtons(status);

          showCardMessage(
            response.result.message || "Статус змінено",
            "success"
          );

          if (navigator.vibrate) {
            navigator.vibrate(150);
          }

          setTimeout(function () {
            scanAnotherAircraft();
          }, 1200);
        }
      );
    }

    function openStarlinkModal() {
      if (!selectedAircraftId) return;

      selectedStarlinkId = currentStarlinkId;

      document
        .getElementById("starlinkModal")
        .classList.remove("hidden");

      document.getElementById("starlinkOptions").innerHTML =
        '<div class="no-items">Завантаження…</div>';

      hideStarlinkMessage();

      apiRequest(
        {
          action: "starlinks",
          id: selectedAircraftId
        },
        function (response) {
          if (!response.ok) {
            showStarlinkMessage(
              response.error || "Не вдалося завантажити список",
              "error"
            );

            return;
          }

          renderStarlinks(response.starlinks || []);
        }
      );
    }

    function renderStarlinks(starlinks) {
      const container =
        document.getElementById("starlinkOptions");

      container.innerHTML = "";

      if (!starlinks.length) {
        container.innerHTML =
          '<div class="no-items">' +
          'Немає доступних STARLINK' +
          '</div>';

        return;
      }

      starlinks.forEach(function (item) {
        const label = document.createElement("label");

        label.className =
          "starlink-option" +
          (item.current ? " current" : "");

        const radio = document.createElement("input");

        radio.type = "radio";
        radio.name = "starlinkChoice";
        radio.value = item.id;
        radio.checked =
          item.id === selectedStarlinkId;

        radio.addEventListener("change", function () {
          selectedStarlinkId = item.id;

          document
            .querySelectorAll(".starlink-option")
            .forEach(function (option) {
              option.classList.remove("current");
            });

          label.classList.add("current");
        });

        const text = document.createElement("span");
        text.className = "starlink-option-text";

        const id = document.createElement("span");
        id.className = "starlink-id";
        id.textContent = item.id;

        const meta = document.createElement("span");
        meta.className = "starlink-meta";
        meta.textContent = item.current
          ? "Зараз встановлений на цьому борту"
          : item.status || "Вільний";

        text.appendChild(id);
        text.appendChild(meta);

        label.appendChild(radio);
        label.appendChild(text);

        container.appendChild(label);
      });
    }

    function saveStarlinkAssignment() {
      if (!selectedAircraftId) return;

      if (!selectedStarlinkId) {
        showStarlinkMessage(
          "Вибери STARLINK зі списку",
          "error"
        );

        return;
      }

      setStarlinkModalButtonsDisabled(true);

      showStarlinkMessage(
        "Збереження прив’язки…",
        "info"
      );

      assignStarlink(selectedStarlinkId);
    }

    function unlinkStarlink() {
      if (!selectedAircraftId) return;

      if (!currentStarlinkId) {
        showStarlinkMessage(
          "На цьому борту STARLINK не прив’язаний",
          "info"
        );

        return;
      }

      setStarlinkModalButtonsDisabled(true);

      showStarlinkMessage(
        "Відв’язування…",
        "info"
      );

      assignStarlink("");
    }

    function assignStarlink(starlinkId) {
      apiRequest(
        {
          action: "assignStarlink",
          id: selectedAircraftId,
          starlink: starlinkId
        },
        function (response) {
          setStarlinkModalButtonsDisabled(false);

          if (!response.ok) {
            showStarlinkMessage(
              response.error || "Помилка прив’язки",
              "error"
            );

            return;
          }

          currentStarlinkId =
            response.result.starlink || "";

          setFieldValue(
            "starlink",
            currentStarlinkId,
            "Не прив’язаний"
          );

          showStarlinkMessage(
            response.result.message,
            "success"
          );

          if (navigator.vibrate) {
            navigator.vibrate(150);
          }

          setTimeout(function () {
            closeStarlinkModal();
          }, 900);
        }
      );
    }

    function closeStarlinkModal() {
      document
        .getElementById("starlinkModal")
        .classList.add("hidden");

      selectedStarlinkId = "";
      hideStarlinkMessage();
      setStarlinkModalButtonsDisabled(false);
    }

    function setStarlinkModalButtonsDisabled(disabled) {
      document
        .querySelectorAll("#starlinkModal button")
        .forEach(function (button) {
          button.disabled = disabled;
        });
    }

    function showStarlinkMessage(text, type) {
      const element =
        document.getElementById("starlinkMessage");

      element.textContent = text;
      element.className = type || "info";
      element.classList.remove("hidden");
    }

    function hideStarlinkMessage() {
      const element =
        document.getElementById("starlinkMessage");

      element.textContent = "";
      element.className = "hidden";
    }

    function disableStatusButtons(disabled) {
      document
        .querySelectorAll(".status-button")
        .forEach(function (button) {
          button.disabled = disabled;
        });
    }

    function scanAnotherAircraft() {
      document
        .getElementById("cardMessage")
        ?.remove();

      startScanner();
    }

    function showCardMessage(text, type) {
      let element =
        document.getElementById("cardMessage");

      if (!element) {
        element = document.createElement("div");
        element.id = "cardMessage";

        document
          .getElementById("aircraftCard")
          .appendChild(element);
      }

      element.textContent = text;
      element.className = type || "info";
    }

    function apiRequest(parameters, callback) {
      const callbackName =
        "hcCallback_" +
        Date.now() +
        "_" +
        Math.floor(Math.random() * 100000);

      const script =
        document.createElement("script");

      window[callbackName] = function (response) {
        try {
          callback(response);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const query = new URLSearchParams({
        ...parameters,
        key: API_KEY,
        callback: callbackName
      });

      script.src =
        API_URL + "?" + query.toString();

      script.onerror = function () {
        delete window[callbackName];
        script.remove();

        showMessage(
          "Не вдалося з’єднатися з Google Sheets.",
          "error"
        );
      };

      document.body.appendChild(script);
    }

    function showMessage(text, type) {
      const element =
        document.getElementById("message");

      element.textContent = text;
      element.className = type || "info";
      element.classList.remove("hidden");
    }

    function hideMessage() {
      document
        .getElementById("message")
        .classList.add("hidden");
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("./sw.js")
          .catch(function (error) {
            console.error(
              "Service Worker error:",
              error
            );
          });
      });
    }
  </script>
  <div id="historyModal" class="modal hidden">
  <div class="modal-content">
    <h3 class="modal-title">Історія борта</h3>

    <div id="historyList">
      <div class="no-items">
        Завантаження…
      </div>
    </div>

    <div id="historyMessage" class="hidden"></div>

    <button
      class="secondary"
      onclick="closeHistoryModal()"
    >
      Закрити
    </button>
  </div>
</div>
</body>
</html>
