<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  >

  <title>Hornet Control</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">

  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="Hornet Control"
  >

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      background: #111827;
      color: #111827;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      margin-bottom: 14px;
      padding: 18px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: 28px;
    }

    h2 {
      margin: 0;
      font-size: 30px;
      text-align: center;
    }

    #reader {
      width: 100%;
      min-height: 280px;
      overflow: hidden;
      background: #000000;
      border-radius: 14px;
    }

    .scanner-help {
      margin: 12px 0 0;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }

    .field {
      padding: 13px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .field:last-of-type {
      border-bottom: 0;
    }

    .label {
      margin-bottom: 5px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .value {
      min-height: 26px;
      font-size: 21px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .empty-value {
      color: #9ca3af;
      font-weight: 500;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 700;
    }

    .badge-storage {
      background: #bfdbfe;
    }

    .badge-workshop {
      background: #fde68a;
    }

    .badge-ready {
      background: #bbf7d0;
    }

    .badge-damaged {
      background: #fed7aa;
    }

    .badge-written-off {
      background: #fecaca;
    }

    .badge-unknown {
      background: #e5e7eb;
    }

    .status-section {
      margin-top: 18px;
    }

    .status-section-title {
      margin-bottom: 8px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
    }

    button {
      width: 100%;
      margin-top: 9px;
      padding: 15px;
      border: 0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.38;
      cursor: default;
    }

    .primary {
      background: #2563eb;
      color: #ffffff;
    }

    .storage {
      background: #93c5fd;
    }

    .workshop {
      background: #fcd34d;
    }

    .ready {
      background: #86efac;
    }

    .damaged {
      background: #fdba74;
    }

    .written-off {
      background: #fca5a5;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    #message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 11px;
      font-size: 16px;
    }

    .info {
      background: #dbeafe;
    }

    .success {
      background: #dcfce7;
    }

    .error {
      background: #fee2e2;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="scannerCard" class="card">
      <h1>Hornet Control</h1>

      <div id="reader"></div>

      <p class="scanner-help">
        Наведи камеру на QR-код борта
      </p>

      <button
        id="cameraButton"
        class="primary hidden"
        onclick="startScanner()"
      >
        Запустити камеру
      </button>

      <div id="message" class="info">
        Запуск камери…
      </div>
    </div>

    <div id="aircraftCard" class="card hidden">

      <h2 id="aircraftId"></h2>

      <div class="field">
        <div class="label">Статус</div>
        <div id="currentStatus"></div>
      </div>

      <div class="field">
        <div class="label">STARLINK</div>
        <div id="starlink" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Серійний номер</div>
        <div id="serialNumber" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Дата отримання</div>
        <div id="receivedDate" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Остання зміна</div>
        <div id="lastChange" class="value"></div>
      </div>

      <div class="field">
        <div class="label">Коментар</div>
        <div id="comment" class="value"></div>
      </div>

      <div class="status-section">
        <div class="status-section-title">
          Змінити статус
        </div>

        <button
          class="status-button storage"
          data-status="На складі"
          onclick="changeStatus('На складі')"
        >
          На складі
        </button>

        <button
          class="status-button workshop"
          data-status="Майстерня"
          onclick="changeStatus('Майстерня')"
        >
          Майстерня
        </button>

        <button
          class="status-button ready"
          data-status="БГ"
          onclick="changeStatus('БГ')"
        >
          БГ
        </button>

        <button
          class="status-button damaged"
          data-status="Пошкоджено"
          onclick="changeStatus('Пошкоджено')"
        >
          Пошкоджено
        </button>

        <button
          class="status-button written-off"
          data-status="Списаний"
          onclick="changeStatus('Списаний')"
        >
          Списаний
        </button>
      </div>

      <button
        class="secondary"
        onclick="scanAnotherAircraft()"
      >
        Сканувати інший борт
      </button>
    </div>

  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbwphLvMa8Ufe2HYMFz2Vg9LqJenq3alIktIiGESiYxN6mwtkCarxxoAiETCfPksnvD3/exec";

    const API_KEY =
      "HC_7YkP9vLm42QaX8Nr5DzB1UcEe96MwFs";

    let scanner = null;
    let scannerRunning = false;
    let scanLocked = false;
    let selectedAircraftId = "";
    let currentAircraftStatus = "";

    window.addEventListener("load", function () {
      startScanner();
    });

    async function startScanner() {
      scanLocked = false;
      selectedAircraftId = "";
      currentAircraftStatus = "";

      document
        .getElementById("aircraftCard")
        .classList.add("hidden");

      document
        .getElementById("scannerCard")
        .classList.remove("hidden");

      document
        .getElementById("cameraButton")
        .classList.add("hidden");

      showMessage("Запуск камери…", "info");

      if (!scanner) {
        scanner = new Html5Qrcode("reader");
      }

      try {
        await scanner.start(
          {
            facingMode: {
              exact: "environment"
            }
          },
          {
            fps: 12,
            qrbox: function (width, height) {
              const size = Math.floor(
                Math.min(width, height) * 0.75
              );

              return {
                width: size,
                height: size
              };
            }
          },
          onScanSuccess,
          function () {}
        );

        scannerRunning = true;
        hideMessage();

      } catch (firstError) {
        try {
          await scanner.start(
            {
              facingMode: "environment"
            },
            {
              fps: 12,
              qrbox: 250
            },
            onScanSuccess,
            function () {}
          );

          scannerRunning = true;
          hideMessage();

        } catch (secondError) {
          scannerRunning = false;

          showMessage(
            "Автоматичний запуск камери заблокований. Натисни кнопку нижче.",
            "error"
          );

          document
            .getElementById("cameraButton")
            .classList.remove("hidden");
        }
      }
    }

    async function stopScanner() {
      if (!scanner || !scannerRunning) return;

      try {
        await scanner.stop();
      } catch (error) {
        console.log(error);
      }

      scannerRunning = false;
    }

    async function onScanSuccess(decodedText) {
      if (scanLocked) return;

      const id = normalizeId(decodedText);

      if (!id) return;

      scanLocked = true;

      await stopScanner();

      loadAircraft(id);
    }

    function normalizeId(value) {
      const text = String(value || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "");

      const match = text.match(/HN-\d{4}/);

      return match ? match[0] : "";
    }

    function loadAircraft(id) {
      showMessage(
        "Завантаження " + id + "…",
        "info"
      );

      apiRequest(
        {
          action: "get",
          id: id
        },
        function (response) {
          if (!response.ok) {
            showMessage(
              response.error || "Помилка завантаження",
              "error"
            );

            scanLocked = false;
            return;
          }

          showAircraft(response.aircraft);
        }
      );
    }

    function showAircraft(aircraft) {
      selectedAircraftId = aircraft.id;
      currentAircraftStatus = aircraft.status;

      document.getElementById("aircraftId").textContent =
        aircraft.id;

      setStatusBadge(aircraft.status);

      setFieldValue(
        "starlink",
        aircraft.starlink,
        "Не прив’язаний"
      );

      setFieldValue(
        "serialNumber",
        aircraft.serialNumber,
        "Не вказано"
      );

      setFieldValue(
        "receivedDate",
        aircraft.receivedDate,
        "Не вказано"
      );

      setFieldValue(
        "lastChange",
        aircraft.lastChange,
        "Немає даних"
      );

      setFieldValue(
        "comment",
        aircraft.comment,
        "Немає коментаря"
      );

      updateStatusButtons(aircraft.status);

      document
        .getElementById("scannerCard")
        .classList.add("hidden");

      document
        .getElementById("aircraftCard")
        .classList.remove("hidden");

      hideMessage();
    }

    function setFieldValue(elementId, value, emptyText) {
      const element =
        document.getElementById(elementId);

      if (value) {
        element.textContent = value;
        element.classList.remove("empty-value");
      } else {
        element.textContent = emptyText;
        element.classList.add("empty-value");
      }
    }

    function setStatusBadge(status) {
      const element =
        document.getElementById("currentStatus");

      element.textContent = status || "Не вказано";
      element.className = "status-badge";

      const classes = {
        "На складі": "badge-storage",
        "Майстерня": "badge-workshop",
        "БГ": "badge-ready",
        "Пошкоджено": "badge-damaged",
        "Списаний": "badge-written-off"
      };

      element.classList.add(
        classes[status] || "badge-unknown"
      );
    }

    function updateStatusButtons(status) {
      document
        .querySelectorAll(".status-button")
        .forEach(function (button) {
          button.disabled =
            button.dataset.status === status;
        });
    }

    function changeStatus(status) {
      if (!selectedAircraftId) return;

      disableStatusButtons(true);

      showCardMessage(
        "Збереження…",
        "info"
      );

      apiRequest(
        {
          action: "update",
          id: selectedAircraftId,
          status: status
        },
        function (response) {
          if (!response.ok) {
            disableStatusButtons(false);

            showCardMessage(
              response.error || "Помилка збереження",
              "error"
            );

            return;
          }

          currentAircraftStatus = status;

          setStatusBadge(status);
          updateStatusButtons(status);

          showCardMessage(
            response.result.message || "Статус змінено",
            "success"
          );

          if (navigator.vibrate) {
            navigator.vibrate(150);
          }

          setTimeout(function () {
            scanAnotherAircraft();
          }, 1200);
        }
      );
    }

    function disableStatusButtons(disabled) {
      document
        .querySelectorAll(".status-button")
        .forEach(function (button) {
          button.disabled = disabled;
        });
    }

    function scanAnotherAircraft() {
      document
        .getElementById("cardMessage")
        ?.remove();

      startScanner();
    }

    function showCardMessage(text, type) {
      let element =
        document.getElementById("cardMessage");

      if (!element) {
        element = document.createElement("div");
        element.id = "cardMessage";

        document
          .getElementById("aircraftCard")
          .appendChild(element);
      }

      element.textContent = text;
      element.className = type || "info";
    }

    function apiRequest(parameters, callback) {
      const callbackName =
        "hcCallback_" +
        Date.now() +
        "_" +
        Math.floor(Math.random() * 100000);

      const script =
        document.createElement("script");

      window[callbackName] = function (response) {
        try {
          callback(response);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const query = new URLSearchParams({
        ...parameters,
        key: API_KEY,
        callback: callbackName
      });

      script.src =
        API_URL + "?" + query.toString();

      script.onerror = function () {
        delete window[callbackName];
        script.remove();

        showMessage(
          "Не вдалося з’єднатися з Google Sheets.",
          "error"
        );
      };

      document.body.appendChild(script);
    }

    function showMessage(text, type) {
      const element =
        document.getElementById("message");

      element.textContent = text;
      element.className = type || "info";
      element.classList.remove("hidden");
    }

    function hideMessage() {
      document
        .getElementById("message")
        .classList.add("hidden");
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("./sw.js")
          .catch(function (error) {
            console.error(
              "Service Worker error:",
              error
            );
          });
      });
    }
  </script>
</body>
</html>
