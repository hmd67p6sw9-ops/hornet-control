<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Hornet Control</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hornet Control">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;padding:14px;background:#111827;color:#111827;font-family:Arial,sans-serif}.container{width:100%;max-width:520px;margin:0 auto}.card{margin-bottom:14px;padding:18px;background:#fff;border-radius:18px;box-shadow:0 5px 20px rgba(0,0,0,.22)}h1{margin:0 0 16px;text-align:center;font-size:28px}h2{margin:0;text-align:center;font-size:30px}h3{margin:0 0 14px}#reader{width:100%;min-height:280px;overflow:hidden;background:#000;border-radius:14px}.scanner-help{margin:12px 0 0;text-align:center;color:#6b7280;font-size:14px}.field{padding:13px 0;border-bottom:1px solid #e5e7eb}.field:last-of-type{border-bottom:0}.label{margin-bottom:5px;color:#6b7280;font-size:14px;font-weight:700;text-transform:uppercase}.value{min-height:26px;font-size:21px;font-weight:700;overflow-wrap:anywhere}.empty-value{color:#9ca3af;font-weight:500}.status-badge{display:inline-block;padding:8px 14px;border-radius:999px;font-size:20px;font-weight:700}.badge-storage{background:#bfdbfe}.badge-workshop{background:#fde68a}.badge-ready{background:#bbf7d0}.badge-damaged{background:#fed7aa}.badge-written-off{background:#fecaca}.badge-unknown{background:#e5e7eb}.starlink-row{display:flex;gap:10px;align-items:center}.starlink-row .value{flex:1}.status-section{margin-top:18px}.section-title{margin-bottom:8px;color:#6b7280;text-align:center;font-size:14px;font-weight:700;text-transform:uppercase}button{width:100%;margin-top:9px;padding:15px;border:0;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer}button:disabled{opacity:.38;cursor:default}.small-button{width:auto;min-width:110px;margin:0;padding:10px 12px;font-size:15px}.primary{background:#2563eb;color:#fff}.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}.storage{background:#93c5fd}.workshop{background:#fcd34d}.ready{background:#86efac}.damaged{background:#fdba74}.written-off{background:#fca5a5}.message{margin-top:12px;padding:12px;border-radius:11px;font-size:16px}.info{background:#dbeafe}.success{background:#dcfce7}.error{background:#fee2e2}.hidden{display:none!important}.modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center;padding:14px;background:rgba(0,0,0,.62)}.modal-content{width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:18px;background:#fff;border-radius:20px 20px 14px 14px}.modal-title{text-align:center;font-size:24px}.starlink-option{display:flex;align-items:center;gap:12px;width:100%;margin-top:9px;padding:14px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;text-align:left;font-size:17px}.starlink-option.current{border-color:#2563eb;background:#dbeafe}.starlink-option input{width:20px;height:20px;flex:0 0 auto}.starlink-option-text{flex:1}.starlink-id{display:block;font-weight:700}.starlink-meta{display:block;margin-top:3px;color:#6b7280;font-size:13px;font-weight:500}.history-item{padding:14px 0;border-bottom:1px solid #e5e7eb}.history-time{margin-bottom:6px;color:#6b7280;font-size:13px}.history-main{font-size:17px;font-weight:700}.history-arrow{display:inline-block;margin:0 8px;color:#6b7280}.history-comment{margin-top:6px;color:#374151;font-size:15px}.form-label{display:block;margin-top:15px;margin-bottom:6px;color:#4b5563;font-size:14px;font-weight:700;text-transform:uppercase}.form-input{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:11px;background:#fff;color:#111827;font-family:inherit;font-size:17px}.form-input:focus{border-color:#2563eb;outline:2px solid #bfdbfe}.form-textarea{min-height:120px;resize:vertical}.no-items{padding:18px 4px;color:#6b7280;text-align:center}
  </style>
</head>
<body>
  <div class="container">
    <div id="scannerCard" class="card">
      <h1>Hornet Control</h1>
      <div id="reader"></div>
      <p class="scanner-help">Наведи камеру на QR-код борта</p>
      <button id="cameraButton" class="primary hidden" onclick="startScanner()">Запустити камеру</button>
      <div id="message" class="message info">Запуск камери…</div>
    </div>

    <div id="aircraftCard" class="card hidden">
      <h2 id="aircraftId"></h2>
      <div class="field"><div class="label">Статус</div><div id="currentStatus"></div></div>
      <div class="field"><div class="label">STARLINK</div><div class="starlink-row"><div id="starlink" class="value"></div><button class="primary small-button" onclick="openStarlinkModal()">Змінити</button></div></div>
      <div class="field"><div class="label">Серійний номер</div><div id="serialNumber" class="value"></div></div>
      <div class="field"><div class="label">Дата отримання</div><div id="receivedDate" class="value"></div></div>
      <div class="field"><div class="label">Остання зміна</div><div id="lastChange" class="value"></div></div>
      <div class="field"><div class="label">Коментар</div><div id="comment" class="value"></div></div>

      <div class="status-section">
        <div class="section-title">Змінити статус</div>
        <button class="status-button storage" data-status="На складі" onclick="changeStatus('На складі')">На складі</button>
        <button class="status-button workshop" data-status="Майстерня" onclick="changeStatus('Майстерня')">Майстерня</button>
        <button class="status-button ready" data-status="БГ" onclick="changeStatus('БГ')">БГ</button>
        <button class="status-button damaged" data-status="Пошкоджено" onclick="changeStatus('Пошкоджено')">Пошкоджено</button>
        <button class="status-button written-off" data-status="Списаний" onclick="changeStatus('Списаний')">Списаний</button>
      </div>

      <button class="primary" onclick="openEditModal()">Редагувати дані</button>
      <button class="secondary" onclick="openHistoryModal()">Історія</button>
      <button class="secondary" onclick="scanAnotherAircraft()">Сканувати інший борт</button>
    </div>
  </div>

  <div id="starlinkModal" class="modal hidden"><div class="modal-content"><h3 class="modal-title">Прив’язка STARLINK</h3><div id="starlinkOptions"><div class="no-items">Завантаження…</div></div><div id="starlinkMessage" class="message hidden"></div><button id="saveStarlinkButton" class="primary" onclick="saveStarlinkAssignment()">Зберегти</button><button id="unlinkStarlinkButton" class="danger" onclick="unlinkStarlink()">Відв’язати STARLINK</button><button class="secondary" onclick="closeStarlinkModal()">Скасувати</button></div></div>

  <div id="historyModal" class="modal hidden"><div class="modal-content"><h3 class="modal-title">Історія борта</h3><div id="historyList"><div class="no-items">Завантаження…</div></div><div id="historyMessage" class="message hidden"></div><button class="secondary" onclick="closeHistoryModal()">Закрити</button></div></div>

  <div id="editModal" class="modal hidden"><div class="modal-content"><h3 class="modal-title">Редагування борта</h3><label class="form-label" for="editSerialNumber">Серійний номер</label><input id="editSerialNumber" class="form-input" type="text" autocomplete="off" placeholder="Наприклад: HRN-240001"><label class="form-label" for="editReceivedDate">Дата отримання</label><input id="editReceivedDate" class="form-input" type="date"><label class="form-label" for="editComment">Коментар</label><textarea id="editComment" class="form-input form-textarea" placeholder="Короткий коментар щодо борта"></textarea><div id="editMessage" class="message hidden"></div><button id="saveDetailsButton" class="primary" onclick="saveAircraftDetails()">Зберегти</button><button class="secondary" onclick="closeEditModal()">Скасувати</button></div></div>

  <script>
    const API_URL = "ВСТАВ_СЮДИ_СВІЙ_URL_APPS_SCRIPT_EXEC";
    const API_KEY = "ВСТАВ_СЮДИ_СВІЙ_API_KEY";

    let scanner=null,scannerRunning=false,scanLocked=false;
    let selectedAircraftId="",currentAircraftStatus="",currentStarlinkId="",selectedStarlinkId="",currentAircraftData=null;

    window.addEventListener("load",startScanner);

    async function startScanner(){
      scanLocked=false;selectedAircraftId="";currentAircraftStatus="";currentStarlinkId="";selectedStarlinkId="";currentAircraftData=null;
      closeStarlinkModal();closeHistoryModal();closeEditModal();
      document.getElementById("aircraftCard").classList.add("hidden");document.getElementById("scannerCard").classList.remove("hidden");document.getElementById("cameraButton").classList.add("hidden");showMessage("Запуск камери…","info");
      if(!scanner)scanner=new Html5Qrcode("reader");
      try{await scanner.start({facingMode:{exact:"environment"}},{fps:12,qrbox:(w,h)=>{const s=Math.floor(Math.min(w,h)*.75);return{width:s,height:s}}},onScanSuccess,()=>{});scannerRunning=true;hideMessage()}
      catch(e1){try{await scanner.start({facingMode:"environment"},{fps:12,qrbox:250},onScanSuccess,()=>{});scannerRunning=true;hideMessage()}catch(e2){scannerRunning=false;showMessage("Автоматичний запуск камери заблокований. Натисни кнопку нижче.","error");document.getElementById("cameraButton").classList.remove("hidden")}}
    }

    async function stopScanner(){if(!scanner||!scannerRunning)return;try{await scanner.stop()}catch(e){console.log(e)}scannerRunning=false}
    async function onScanSuccess(text){if(scanLocked)return;const id=normalizeId(text);if(!id)return;scanLocked=true;await stopScanner();loadAircraft(id)}
    function normalizeId(v){const m=String(v||"").trim().toUpperCase().replace(/\s+/g,"").match(/HN-\d{4}/);return m?m[0]:""}

    function loadAircraft(id){showMessage("Завантаження "+id+"…","info");apiRequest({action:"get",id},r=>{if(!r.ok){showMessage(r.error||"Помилка завантаження","error");scanLocked=false;return}showAircraft(r.aircraft)})}

    function showAircraft(a){currentAircraftData=a;selectedAircraftId=a.id;currentAircraftStatus=a.status;currentStarlinkId=a.starlink||"";document.getElementById("aircraftId").textContent=a.id;setStatusBadge(a.status);setFieldValue("starlink",a.starlink,"Не прив’язаний");setFieldValue("serialNumber",a.serialNumber,"Не вказано");setFieldValue("receivedDate",a.receivedDate,"Не вказано");setFieldValue("lastChange",a.lastChange,"Немає даних");setFieldValue("comment",a.comment,"Немає коментаря");updateStatusButtons(a.status);document.getElementById("scannerCard").classList.add("hidden");document.getElementById("aircraftCard").classList.remove("hidden");hideMessage()}
    function setFieldValue(id,v,empty){const e=document.getElementById(id);if(v){e.textContent=v;e.classList.remove("empty-value")}else{e.textContent=empty;e.classList.add("empty-value")}}
    function setStatusBadge(s){const e=document.getElementById("currentStatus");e.textContent=s||"Не вказано";e.className="status-badge";const c={"На складі":"badge-storage","Майстерня":"badge-workshop","БГ":"badge-ready","Пошкоджено":"badge-damaged","Списаний":"badge-written-off"};e.classList.add(c[s]||"badge-unknown")}
    function updateStatusButtons(s){document.querySelectorAll(".status-button").forEach(b=>b.disabled=b.dataset.status===s)}

    function changeStatus(status){if(!selectedAircraftId)return;disableStatusButtons(true);showCardMessage("Збереження…","info");apiRequest({action:"update",id:selectedAircraftId,status},r=>{if(!r.ok){disableStatusButtons(false);showCardMessage(r.error||"Помилка збереження","error");return}currentAircraftStatus=status;setStatusBadge(status);updateStatusButtons(status);showCardMessage(r.result.message||"Статус змінено","success");if(navigator.vibrate)navigator.vibrate(150);setTimeout(scanAnotherAircraft,1200)})}

    function openStarlinkModal(){if(!selectedAircraftId)return;selectedStarlinkId=currentStarlinkId;document.getElementById("starlinkModal").classList.remove("hidden");document.getElementById("starlinkOptions").innerHTML='<div class="no-items">Завантаження…</div>';hideStarlinkMessage();apiRequest({action:"starlinks",id:selectedAircraftId},r=>{if(!r.ok){showStarlinkMessage(r.error||"Не вдалося завантажити список","error");return}renderStarlinks(r.starlinks||[])})}
    function renderStarlinks(items){const c=document.getElementById("starlinkOptions");c.innerHTML="";if(!items.length){c.innerHTML='<div class="no-items">Немає доступних STARLINK</div>';return}items.forEach(item=>{const l=document.createElement("label");l.className="starlink-option"+(item.current?" current":"");const radio=document.createElement("input");radio.type="radio";radio.name="starlinkChoice";radio.value=item.id;radio.checked=item.id===selectedStarlinkId;radio.addEventListener("change",()=>{selectedStarlinkId=item.id;document.querySelectorAll(".starlink-option").forEach(o=>o.classList.remove("current"));l.classList.add("current")});const t=document.createElement("span");t.className="starlink-option-text";const id=document.createElement("span");id.className="starlink-id";id.textContent=item.id;const meta=document.createElement("span");meta.className="starlink-meta";meta.textContent=item.current?"Зараз встановлений на цьому борту":item.status||"Вільний";t.append(id,meta);l.append(radio,t);c.appendChild(l)})}
    function saveStarlinkAssignment(){if(!selectedAircraftId)return;if(!selectedStarlinkId){showStarlinkMessage("Вибери STARLINK зі списку","error");return}setStarlinkModalButtonsDisabled(true);showStarlinkMessage("Збереження прив’язки…","info");assignStarlink(selectedStarlinkId)}
    function unlinkStarlink(){if(!selectedAircraftId)return;if(!currentStarlinkId){showStarlinkMessage("На цьому борту STARLINK не прив’язаний","info");return}setStarlinkModalButtonsDisabled(true);showStarlinkMessage("Відв’язування…","info");assignStarlink("")}
    function assignStarlink(starlink){apiRequest({action:"assignStarlink",id:selectedAircraftId,starlink},r=>{setStarlinkModalButtonsDisabled(false);if(!r.ok){showStarlinkMessage(r.error||"Помилка прив’язки","error");return}currentStarlinkId=r.result.starlink||"";setFieldValue("starlink",currentStarlinkId,"Не прив’язаний");if(currentAircraftData)currentAircraftData.starlink=currentStarlinkId;showStarlinkMessage(r.result.message,"success");if(navigator.vibrate)navigator.vibrate(150);setTimeout(closeStarlinkModal,900)})}
    function closeStarlinkModal(){document.getElementById("starlinkModal").classList.add("hidden");selectedStarlinkId="";hideStarlinkMessage();setStarlinkModalButtonsDisabled(false)}
    function setStarlinkModalButtonsDisabled(v){document.querySelectorAll("#starlinkModal button").forEach(b=>b.disabled=v)}

    function openHistoryModal(){if(!selectedAircraftId)return;document.getElementById("historyModal").classList.remove("hidden");document.getElementById("historyList").innerHTML='<div class="no-items">Завантаження…</div>';hideHistoryMessage();apiRequest({action:"history",id:selectedAircraftId},r=>{if(!r.ok){document.getElementById("historyList").innerHTML="";showHistoryMessage(r.error||"Не вдалося завантажити історію","error");return}renderHistory(r.history||[])})}
    function renderHistory(items){const c=document.getElementById("historyList");c.innerHTML="";if(!items.length){c.innerHTML='<div class="no-items">Історія відсутня</div>';return}items.forEach(item=>{const b=document.createElement("div");b.className="history-item";const time=document.createElement("div");time.className="history-time";time.textContent=item.timestamp;const main=document.createElement("div");main.className="history-main";if(item.type==="starlink"||item.type==="details")main.textContent=item.comment;else main.innerHTML=escapeHtml(item.oldStatus||"Не вказано")+'<span class="history-arrow">→</span>'+escapeHtml(item.newStatus||"Не вказано");b.append(time,main);if(item.comment&&item.type!=="starlink"&&item.type!=="details"){const cm=document.createElement("div");cm.className="history-comment";cm.textContent=item.comment;b.appendChild(cm)}c.appendChild(b)})}
    function closeHistoryModal(){document.getElementById("historyModal").classList.add("hidden");hideHistoryMessage()}

    function openEditModal(){if(!currentAircraftData)return;document.getElementById("editSerialNumber").value=currentAircraftData.serialNumber||"";document.getElementById("editReceivedDate").value=displayDateToInputDate(currentAircraftData.receivedDate);document.getElementById("editComment").value=currentAircraftData.comment||"";hideEditMessage();document.getElementById("editModal").classList.remove("hidden")}
    function closeEditModal(){document.getElementById("editModal").classList.add("hidden");hideEditMessage();setEditButtonsDisabled(false)}
    function saveAircraftDetails(){if(!selectedAircraftId)return;const serialNumber=document.getElementById("editSerialNumber").value.trim();const receivedDate=document.getElementById("editReceivedDate").value;const comment=document.getElementById("editComment").value.trim();setEditButtonsDisabled(true);showEditMessage("Збереження даних…","info");apiRequest({action:"updateDetails",id:selectedAircraftId,serialNumber,receivedDate,comment},r=>{setEditButtonsDisabled(false);if(!r.ok){showEditMessage(r.error||"Не вдалося зберегти дані","error");return}if(r.result.aircraft)showAircraft(r.result.aircraft);showEditMessage(r.result.message||"Дані оновлено","success");if(navigator.vibrate)navigator.vibrate(150);setTimeout(closeEditModal,800)})}
    function displayDateToInputDate(v){const m=String(v||"").trim().match(/^(\d{2})\.(\d{2})\.(\d{4})$/);return m?m[3]+"-"+m[2]+"-"+m[1]:""}
    function setEditButtonsDisabled(v){document.querySelectorAll("#editModal button").forEach(b=>b.disabled=v);document.getElementById("editSerialNumber").disabled=v;document.getElementById("editReceivedDate").disabled=v;document.getElementById("editComment").disabled=v}

    function disableStatusButtons(v){document.querySelectorAll(".status-button").forEach(b=>b.disabled=v)}
    function scanAnotherAircraft(){const m=document.getElementById("cardMessage");if(m)m.remove();startScanner()}
    function showCardMessage(t,type){let e=document.getElementById("cardMessage");if(!e){e=document.createElement("div");e.id="cardMessage";e.className="message";document.getElementById("aircraftCard").appendChild(e)}e.textContent=t;e.className="message "+(type||"info")}

    function showMessage(t,type){const e=document.getElementById("message");e.textContent=t;e.className="message "+(type||"info");e.classList.remove("hidden")}
    function hideMessage(){document.getElementById("message").classList.add("hidden")}
    function showStarlinkMessage(t,type){const e=document.getElementById("starlinkMessage");e.textContent=t;e.className="message "+(type||"info");e.classList.remove("hidden")}
    function hideStarlinkMessage(){const e=document.getElementById("starlinkMessage");e.textContent="";e.className="message hidden"}
    function showHistoryMessage(t,type){const e=document.getElementById("historyMessage");e.textContent=t;e.className="message "+(type||"info");e.classList.remove("hidden")}
    function hideHistoryMessage(){const e=document.getElementById("historyMessage");e.textContent="";e.className="message hidden"}
    function showEditMessage(t,type){const e=document.getElementById("editMessage");e.textContent=t;e.className="message "+(type||"info");e.classList.remove("hidden")}
    function hideEditMessage(){const e=document.getElementById("editMessage");e.textContent="";e.className="message hidden"}
    function escapeHtml(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}

    function apiRequest(parameters,callback){const cb="hcCallback_"+Date.now()+"_"+Math.floor(Math.random()*100000);const s=document.createElement("script");window[cb]=r=>{try{callback(r)}finally{delete window[cb];s.remove()}};const q=new URLSearchParams({...parameters,key:API_KEY,callback:cb});s.src=API_URL+"?"+q.toString();s.onerror=()=>{delete window[cb];s.remove();showMessage("Не вдалося з’єднатися з Google Sheets.","error")};document.body.appendChild(s)}

    if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(e=>console.error("Service Worker error:",e)))}
  </script>
</body>
</html>
